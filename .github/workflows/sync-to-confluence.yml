name: Sync Markdown to Confluence

on:
  push:
    branches:
      - main
    paths:
      - '**.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: confluence-sync
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed markdown files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **.md
          separator: "\n"

      - name: Determine files to sync
        id: files
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "Full sync — syncing all markdown files"
            TO_SYNC=$(git ls-files '*.md')
            DELETED=""
          else
            TO_SYNC="${{ steps.changed-files.outputs.all_changed_files }}"
            DELETED="${{ steps.changed-files.outputs.deleted_files }}"
          fi
          {
            echo "to_sync<<DELIM"
            echo "$TO_SYNC"
            echo "DELIM"
            echo "deleted<<DELIM"
            echo "$DELETED"
            echo "DELIM"
          } >> $GITHUB_OUTPUT
          if [ -n "$TO_SYNC" ] || [ -n "$DELETED" ]; then
            echo "has_work=true" >> $GITHUB_OUTPUT
          else
            echo "has_work=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.files.outputs.has_work == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.files.outputs.has_work == 'true'
        run: pip install -r scripts/requirements.txt

      - name: Sync changed files to Confluence
        if: steps.files.outputs.has_work == 'true'
        env:
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          CHANGED_FILES: ${{ steps.files.outputs.to_sync }}
          DELETED_FILES: ${{ steps.files.outputs.deleted }}
        run: python scripts/sync_to_confluence.py

      - name: Commit confluence_id write-backs
        if: steps.files.outputs.has_work == 'true'
        run: |
          if [ ! -f /tmp/written_back.txt ] || [ ! -s /tmp/written_back.txt ]; then
            echo "No write-backs to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          while IFS= read -r file; do git add "$file"; done < /tmp/written_back.txt
          git diff --staged --quiet && echo "Nothing to commit." && exit 0
          git commit -m "chore: write back confluence metadata [skip ci]"
          git push
